# ============================================================
# Application Configuration
# ============================================================
spring.application.name=csv-upload-demo
server.port=8080

# ============================================================
# SQLite DataSource Configuration
# ============================================================
spring.datasource.url=jdbc:sqlite:./data/customers.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JDBC batch size — capped at 500 (TECHNIQUE 4: lower peak heap per TX)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# TECHNIQUE 6: disable stats/SQL logging — removes per-statement overhead objects
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.show-sql=false

# ============================================================
# Multipart File Upload Configuration
# ============================================================
# Allow very large CSV uploads (up to 2 GB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB
# Stream directly to temp file — never buffered in JVM heap
spring.servlet.multipart.file-size-threshold=1MB
spring.servlet.multipart.location=${java.io.tmpdir}

# ============================================================
# Async Thread Pool + Processing Configuration
# ============================================================
csv.processing.thread-pool-size=4
# TECHNIQUE 4: batch size 500 — halves per-TX heap vs 1000
csv.processing.batch-size=500

# ============================================================
# Tomcat connector — increase timeouts for large uploads
# ============================================================
server.tomcat.connection-timeout=300000
server.tomcat.max-swallow-size=-1

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false

